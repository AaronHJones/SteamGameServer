# Add this server block to your existing nginx config
# (e.g. /etc/nginx/sites-available/gameserver-ui)
# Then: sudo ln -s /etc/nginx/sites-available/gameserver-ui /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;              # replace with your actual hostname or IP

    # Blazor SignalR — WebSocket upgrade required
    location / {
        proxy_pass         http://localhost:5050;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;   # keep SignalR connections alive
    }
}
